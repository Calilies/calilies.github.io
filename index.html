<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calilies</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #ffe6f2, #f3e8ff);
      color: #333;
      text-align: center;
    }

    .hero {
      padding: 120px 20px;
    }

    h1 {
      font-size: 3.5rem;
      margin: 0;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      border-radius: 25px;
      background: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>Calilies</h1>
    <p>3D Artist | Roblox UGC Creator</p>
    <button class="btn">View Portfolio</button>
  </section>

</body>
</html>
